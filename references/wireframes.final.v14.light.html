<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f5f7ff 0%, #eef1f8 50%, #e6ebf5 100%); min-height: 100vh; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
h2 { color: rgba(30,30,60,0.8); margin-bottom: 16px; font-size: 14px; text-align: center; width: 100%; font-weight: 500; letter-spacing: 0.5px; }

.phone {
 width: 375px;
 height: 667px;
 background: #ffffff;
 border-radius: 40px;
 overflow: hidden;
 box-shadow: 0 30px 80px rgba(80,100,200,0.15), 0 0 50px rgba(100,126,234,0.08);
 position: relative;
 border: 1px solid rgba(100,126,234,0.1);
}

.status-bar { height: 44px; background: #ffffff; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 24px 8px; }
.status-time { font-size: 14px; font-weight: 600; color: #1a1a3e; letter-spacing: -0.2px; }
.status-icons { display: flex; gap: 5px; align-items: center; }

.home-bar { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); width: 120px; height: 4px; background: rgba(102,126,234,0.4); border-radius: 2px; }

.screen-body { padding: 16px 16px 90px; height: calc(667px - 44px); display: flex; flex-direction: column; overflow-y: auto; }

.header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-shrink: 0; }
.back-btn { width: 34px; height: 34px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.back-btn svg { color: #fff; width: 14px; height: 14px; }

.query-preview { flex: 1; background: rgba(102,126,234,0.06); border: none; border-radius: 10px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
.query-preview .search-icon { width: 26px; height: 26px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.query-preview .search-icon svg { width: 11px; height: 11px; }
.query-text { font-size: 11px; color: rgba(30,30,60,0.85); font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-shrink: 0; }
.results-count { font-size: 18px; font-weight: 700; color: #1a1a3e; letter-spacing: -0.5px; }
.results-count span { font-size: 11px; font-weight: 500; color: rgba(30,30,60,0.45); }

.photo-list { display: flex; flex-direction: column; gap: 12px; flex: 1; overflow-y: auto; padding-bottom: 8px; }

.photo-card {
 background: #ffffff;
 border-radius: 16px;
 overflow: hidden;
 display: flex;
 cursor: pointer;
 height: 160px;
 box-shadow: 0 2px 16px rgba(100,126,234,0.07);
 transition: box-shadow 0.25s ease, transform 0.25s ease;
}
.photo-card:hover {
 box-shadow: 0 8px 32px rgba(100,126,234,0.14);
 transform: translateY(-1px);
}

.photo-thumb {
 flex: 1;
 overflow: hidden;
 position: relative;
}
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

.icon-strip {
 width: 60px;
 background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(250,250,255,0.9) 100%);
 border-left: 1px solid rgba(100,126,234,0.06);
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: spaceEvenly;
 padding: 8px 0;
 gap: 4px;
}

.icon-btn {
 width: 42px;
 height: 42px;
 display: flex;
 align-items: center;
 justify-content: center;
 background: rgba(102,126,234,0.06);
 border-radius: 12px;
 cursor: pointer;
 transition: all 0.2s ease;
 color: rgba(102,126,234,0.75);
}
.icon-btn:active {
 background: linear-gradient(135deg, #667eea, #764ba2);
 color: #fff;
 transform: scale(0.94);
}
.icon-btn svg { width: 18px; height: 18px; }

.bottom-nav {
 position: absolute;
 bottom: 0;
 left: 50%;
 transform: translateX(-50%);
 width: 375px;
 display: flex;
 gap: 0;
 background: rgba(255,255,255,0.97);
 border-top: 1px solid rgba(100,126,234,0.08);
 padding: 8px 20px 20px;
}
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 0; cursor: pointer; position: relative; transition: all 0.3s; }
.nav-item.active::before { content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 2px; }
.nav-item.active .nav-icon { color: #667eea; }
.nav-item.active .nav-label { color: #667eea; font-weight: 600; }
.nav-icon { font-size: 20px; color: rgba(30,30,60,0.35); }
.nav-label { font-size: 8px; color: rgba(30,30,60,0.35); font-weight: 500; }

.screen-num { font-size: 10px; color: rgba(30,30,60,0.4); margin-bottom: 8px; font-weight: 500; letter-spacing: 0.8px; text-align: center; text-transform: uppercase; }
</style>
</head>
