<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f0f4ff 0%, #e8eef8 50%, #dce4f5 100%); min-height: 100vh; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
h2 { color: rgba(30,30,60,0.9); margin-bottom: 16px; font-size: 14px; text-align: center; width: 100%; font-weight: 500; letter-spacing: 0.5px; }

.phone {
 width: 375px;
 height: 667px;
 background: #ffffff;
 border-radius: 44px;
 overflow: hidden;
 box-shadow: 0 40px 100px rgba(80,100,200,0.2), 0 0 60px rgba(100,126,234,0.1);
 position: relative;
 border: 1px solid rgba(100,126,234,0.15);
}

.status-bar { height: 44px; background: #ffffff; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 24px 8px; }
.status-time { font-size: 14px; font-weight: 600; color: #1a1a3e; letter-spacing: -0.2px; }
.status-icons { display: flex; gap: 5px; align-items: center; }

.home-bar { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 3px; opacity: 0.5; }

.screen-body { padding: 16px 18px 100px; height: calc(667px - 44px); display: flex; flex-direction: column; overflow-y: auto; }

.header-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-shrink: 0; }
.back-btn { width: 36px; height: 36px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 20px rgba(102,126,234,0.3); transition: all 0.3s; flex-shrink: 0; }
.back-btn:hover { transform: translateY(-2px) scale(1.05); }
.back-btn svg { color: #fff; width: 16px; height: 16px; }

.query-preview { flex: 1; background: rgba(102,126,234,0.06); border: 1px solid rgba(102,126,234,0.15); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(10px); }
.query-preview .search-icon { width: 28px; height: 28px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.query-preview .search-icon svg { width: 12px; height: 12px; }
.query-text { font-size: 12px; color: rgba(30,30,60,0.9); font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-shrink: 0; }
.results-left { display: flex; flex-direction: column; gap: 1px; }
.results-count { font-size: 20px; font-weight: 700; color: #1a1a3e; letter-spacing: -0.5px; }
.results-count span { font-size: 12px; font-weight: 500; color: rgba(30,30,60,0.5); }
.sort-btn { display: flex; align-items: center; gap: 4px; background: rgba(102,126,234,0.08); border: 1px solid rgba(102,126,234,0.2); border-radius: 8px; padding: 6px 10px; font-size: 10px; color: rgba(30,30,60,0.8); cursor: pointer; transition: all 0.3s; }
.sort-btn:hover { background: rgba(102,126,234,0.2); }
.sort-btn svg { width: 12px; height: 12px; }

.photo-list { display: flex; flex-direction: column; gap: 12px; flex: 1; overflow-y: auto; padding-bottom: 10px; }

.photo-card {
 background: #fafbff;
 border: 1px solid rgba(102,126,234,0.12);
 border-radius: 14px;
 overflow: hidden;
 display: flex;
 transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
 cursor: pointer;
 min-height: 150px;
}
.photo-card:hover {
 transform: translateY(-2px);
 border-color: rgba(102,126,234,0.4);
 box-shadow: 0 12px 40px rgba(102,126,234,0.12);
 background: #ffffff;
}

.photo-thumb {
 flex: 0 0 66%;
 height: 150px;
 overflow: hidden;
}
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

.card-right { flex: 0 0 34%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px 8px; gap: 10px; background: rgba(102,126,234,0.03); }

.card-icon-btn {
 width: 40px;
 height: 40px;
 display: flex;
 align-items: center;
 justify-content: center;
 background: #ffffff;
 border: 1px solid rgba(102,126,234,0.15);
 border-radius: 10px;
 cursor: pointer;
 transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
 color: rgba(102,126,234,0.8);
}
.card-icon-btn:hover {
 background: linear-gradient(135deg, #667eea, #764ba2);
 border-color: transparent;
 color: #fff;
 transform: scale(1.1);
 box-shadow: 0 4px 12px rgba(102,126,234,0.3);
}
.card-icon-btn:active { transform: scale(0.95); }
.card-icon-btn svg { width: 18px; height: 18px; }

.bottom-nav {
 position: absolute;
 bottom: 0;
 left: 50%;
 transform: translateX(-50%);
 width: 375px;
 display: flex;
 gap: 0;
 background: rgba(255,255,255,0.95);
 backdrop-filter: blur(20px);
 border-top: 1px solid rgba(102,126,234,0.1);
 border-radius: 24px 24px 0 0;
 padding: 10px 20px 24px;
 box-shadow: 0 -4px 30px rgba(102,126,234,0.08);
}
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 0; cursor: pointer; position: relative; transition: all 0.3s; }
.nav-item.active::before { content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 24px; height: 2.5px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 3px; }
.nav-item.active .nav-icon { color: #667eea; transform: scale(1.1); }
.nav-item.active .nav-label { color: #667eea; font-weight: 600; }
.nav-icon { font-size: 22px; color: rgba(30,30,60,0.4); transition: all 0.3s; }
.nav-item:hover .nav-icon { color: rgba(102,126,234,0.7); }
.nav-label { font-size: 9px; color: rgba(30,30,60,0.4); font-weight: 500; transition: all 0.3s; }
.nav-item:hover .nav-label { color: rgba(102,126,234,0.7); }

.screen-num { font-size: 10px; color: rgba(30,30,60,0.5); margin-bottom: 8px; font-weight: 500; letter-spacing: 0.8px; text-align: center; text-transform: uppercase; }
</style>
</head>
