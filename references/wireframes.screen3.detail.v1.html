<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f0f2f8 0%, #e8ecf4 50%, #e2e7f0 100%); min-height: 100vh; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
h2 { color: rgba(30,30,60,0.8); margin-bottom: 16px; font-size: 14px; text-align: center; width: 100%; font-weight: 500; letter-spacing: 0.5px; }

.phone {
 width: 375px;
 height: 667px;
 background: #f8f9fc;
 border-radius: 40px;
 overflow: hidden;
 box-shadow: 0 30px 80px rgba(60,80,180,0.12), 0 0 40px rgba(100,126,234,0.06);
 position: relative;
 border: 1px solid rgba(100,126,234,0.08);
}

.status-bar { height: 44px; background: #0a0a1a; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 24px 8px; }
.status-time { font-size: 14px; font-weight: 600; color: #fff; letter-spacing: -0.2px; }
.status-icons { display: flex; gap: 5px; align-items: center; }

.home-bar { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); width: 120px; height: 4px; background: rgba(102,126,234,0.35); border-radius: 2px; }

/* Dark mode photo view */
.screen-body { background: #0a0a1a; height: calc(667px - 44px); display: flex; flex-direction: column; }

.top-bar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; }
.back-btn { width: 36px; height: 36px; background: rgba(255,255,255,0.08); border: none; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.back-btn svg { color: #fff; width: 16px; height: 16px; }

.match-badge { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: 20px; letter-spacing: 0.3px; }

.top-actions { display: flex; gap: 8px; margin-left: auto; }
.icon-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.08); border: none; border-radius: 12px; cursor: pointer; color: #fff; }
.icon-btn svg { width: 16px; height: 16px; }

/* Photo area */
.photo-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 16px; overflow: hidden; }
.photo-container { width: 100%; height: 100%; border-radius: 16px; overflow: hidden; position: relative; }
.photo-container img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* Bottom info panel */
.info-panel { background: rgba(20,20,40,0.95); backdrop-filter: blur(20px); padding: 16px 16px 90px; border-top: 1px solid rgba(255,255,255,0.06); }

.query-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.query-label { font-size: 10px; color: rgba(255,255,255,0.4); font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; }
.query-text { font-size: 13px; color: rgba(255,255,255,0.9); font-weight: 500; background: rgba(102,126,234,0.15); border: 1px solid rgba(102,126,234,0.2); padding: 6px 12px; border-radius: 10px; flex: 1; }

.meta-row { display: flex; gap: 16px; margin-bottom: 16px; }
.meta-item { display: flex; align-items: center; gap: 6px; }
.meta-item svg { width: 14px; height: 14px; color: rgba(255,255,255,0.4); }
.meta-item span { font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 400; }

.action-row { display: flex; gap: 10px; justify-content: center; }
.action-btn {
 flex: 1;
 max-width: 110px;
 display: flex;
 flex-direction: column;
 align-items: center;
 gap: 6px;
 padding: 12px 8px;
 background: rgba(255,255,255,0.06);
 border: 1px solid rgba(255,255,255,0.08);
 border-radius: 16px;
 cursor: pointer;
 transition: all 0.2s ease;
}
.action-btn:active { background: rgba(102,126,234,0.2); border-color: rgba(102,126,234,0.3); transform: scale(0.95); }
.action-btn svg { width: 20px; height: 20px; color: rgba(255,255,255,0.8); }
.action-btn span { font-size: 10px; color: rgba(255,255,255,0.5); font-weight: 500; letter-spacing: 0.3px; }

/* Bottom nav */
.bottom-nav {
 position: absolute;
 bottom: 0;
 left: 50%;
 transform: translateX(-50%);
 width: 375px;
 display: flex;
 gap: 0;
 background: rgba(20,20,40,0.98);
 border-top: 1px solid rgba(255,255,255,0.06);
 padding: 8px 20px 20px;
 backdrop-filter: blur(20px);
}
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 0; cursor: pointer; position: relative; transition: all 0.3s; }
.nav-item.active::before { content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 20px; height: 2.5px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 2px; }
.nav-item.active .nav-icon { color: #667eea; }
.nav-item.active .nav-label { color: #667eea; font-weight: 600; }
.nav-icon { font-size: 22px; color: rgba(255,255,255,0.3); }
.nav-label { font-size: 8.5px; color: rgba(255,255,255,0.3); font-weight: 500; letter-spacing: 0.3px; }

.screen-num { font-size: 10px; color: rgba(30,30,60,0.4); margin-bottom: 8px; font-weight: 500; letter-spacing: 0.8px; text-align: center; text-transform: uppercase; }
</style>
</head>
<body>
