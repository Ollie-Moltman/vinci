<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
h2 { color: rgba(255,255,255,0.9); margin-bottom: 20px; font-size: 14px; text-align: center; width: 100%; font-weight: 500; letter-spacing: 0.5px; }

.phone {
  width: 375px;
  min-height: 812px;
  background: linear-gradient(180deg, #f8f9ff 0%, #eef1f8 100%);
  border-radius: 44px;
  overflow: hidden;
  box-shadow: 0 40px 100px rgba(0,0,0,0.25), 0 15px 50px rgba(102,126,234,0.3);
  position: relative;
}

.status-bar { height: 44px; background: linear-gradient(180deg, #f8f9ff 0%, #eef1f8 100%); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 24px 8px; }
.status-time { font-size: 14px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.2px; }
.status-icons { display: flex; gap: 5px; align-items: center; }

.home-bar { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 3px; opacity: 0.5; }

.screen-body { padding: 20px 18px 36px; height: calc(812px - 44px); display: flex; flex-direction: column; }

.header-row { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.back-btn { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(102,126,234,0.4); transition: transform 0.2s, box-shadow 0.2s; }
.back-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.5); }
.back-btn svg { color: #fff; }

.query-preview { flex: 1; background: #fff; border: none; border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 20px rgba(102,126,234,0.12); }
.query-preview .search-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 3px 10px rgba(102,126,234,0.3); }
.query-text { font-size: 13px; color: #333; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.results-left { display: flex; flex-direction: column; gap: 2px; }
.results-count { font-size: 26px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.5px; }
.results-count span { font-size: 13px; font-weight: 500; color: #8b92b8; }
.sort-btn { display: flex; align-items: center; gap: 6px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 10px; padding: 8px 14px; font-size: 11px; color: #fff; cursor: pointer; box-shadow: 0 3px 12px rgba(102,126,234,0.35); transition: transform 0.2s; }
.sort-btn:hover { transform: scale(1.05); }
.sort-btn svg { width: 14px; height: 14px; }

.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; flex: 1; overflow-y: auto; padding-bottom: 8px; }
.photo-card { aspect-ratio: 1; background: linear-gradient(135deg, #e8ecf5, #dde2ed); border-radius: 14px; overflow: hidden; position: relative; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s; }
.photo-card:hover { transform: scale(1.03) translateY(-3px); box-shadow: 0 12px 35px rgba(102,126,234,0.25); z-index: 10; }
.photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

.match-badge { position: absolute; bottom: 8px; right: 8px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 10px; font-weight: 700; padding: 5px 9px; border-radius: 8px; letter-spacing: 0.3px; box-shadow: 0 3px 10px rgba(102,126,234,0.4); backdrop-filter: blur(4px); }

.fav-icon { position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; background: rgba(255,255,255,0.95); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 10px rgba(0,0,0,0.15); backdrop-filter: blur(4px); }

/* Staggered grid rows for natural masonry feel */
.photo-card:nth-child(3n+2) { margin-top: 6px; }
.photo-card:nth-child(3n+3) { margin-top: 12px; }

.bottom-nav { 
  display: flex; 
  gap: 0; 
  border-top: 1px solid rgba(102,126,234,0.12); 
  padding-top: 14px; 
  margin-top: 18px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  border-radius: 20px 20px 0 0;
  margin: 18px -18px -36px;
  padding: 14px 20px 20px;
}
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 10px 0; cursor: pointer; position: relative; }
.nav-item.active::before { content: ''; position: absolute; top: -14px; left: 50%; transform: translateX(-50%); width: 30px; height: 3px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 3px; }
.nav-item.active .nav-icon { color: #667eea; }
.nav-item.active .nav-label { color: #667eea; font-weight: 600; }
.nav-icon { font-size: 24px; color: #b8bfd1; transition: color 0.3s, transform 0.3s; }
.nav-item:hover .nav-icon { transform: scale(1.1); }
.nav-label { font-size: 10px; color: #b8bfd1; font-weight: 500; transition: color 0.3s; }

.screen-num { font-size: 11px; color: rgba(255,255,255,0.7); margin-bottom: 10px; font-weight: 500; letter-spacing: 0.8px; text-align: center; text-transform: uppercase; }
</style>
</head>
