<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #eaeef4; padding: 40px; display: flex; flex-direction: column; align-items: center; }
h2 { color: #444; margin-bottom: 20px; font-size: 14px; text-align: center; width: 100%; font-weight: 500; letter-spacing: 0.3px; }

.phone {
  width: 375px;
  min-height: 812px;
  background: #f4f6fc;
  border-radius: 44px;
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.12), 0 8px 32px rgba(0,0,0,0.08);
  position: relative;
}

.status-bar { height: 44px; background: #f4f6fc; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 24px 8px; }
.status-time { font-size: 14px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.2px; }
.status-icons { display: flex; gap: 5px; align-items: center; }

.home-bar { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; background: #1a1a1a; border-radius: 3px; opacity: 0.2; }

.screen-body { padding: 20px 18px 40px; height: calc(812px - 44px); display: flex; flex-direction: column; }

.top-bar { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.back-btn { width: 36px; height: 36px; background: #fff; border: 1px solid #e2e6f2; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 1px 4px rgba(80,100,180,0.06); }
.back-btn svg { color: #5a7fd6; }
.query-preview { flex: 1; background: #fff; border: 1px solid #e2e6f2; border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; box-shadow: 0 1px 4px rgba(80,100,180,0.06); }
.query-preview .search-icon { width: 26px; height: 26px; background: linear-gradient(135deg, #5a7fd6, #4468b8); border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.query-text { font-size: 13px; color: #333; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.results-summary { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.results-count { font-size: 20px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.3px; }
.results-count span { font-size: 13px; font-weight: 500; color: #7e8db8; }
.sort-btn { display: flex; align-items: center; gap: 5px; background: #fff; border: 1px solid #e2e6f2; border-radius: 8px; padding: 6px 10px; font-size: 11px; color: #888; cursor: pointer; box-shadow: 0 1px 4px rgba(80,100,180,0.05); }
.sort-btn svg { width: 13px; height: 13px; }

.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; flex: 1; overflow-y: auto; }
.photo-card { aspect-ratio: 1; background: #e2e6f2; border-radius: 8px; overflow: hidden; position: relative; cursor: pointer; }
.photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-card .match-badge { position: absolute; bottom: 5px; right: 5px; background: rgba(90,127,214,0.9); color: #fff; font-size: 9px; font-weight: 700; padding: 3px 6px; border-radius: 5px; letter-spacing: 0.2px; }
.photo-card .fav-icon { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; }

/* Row variations for natural look */
.photo-card:nth-child(3n+2) { margin-top: 3px; }

.bottom-nav { display: flex; gap: 0; border-top: 1px solid #e2e6f2; padding-top: 12px; margin-top: 16px; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 0; cursor: pointer; }
.nav-item.active .nav-icon { color: #5a7fd6; }
.nav-item.active .nav-label { color: #5a7fd6; font-weight: 600; }
.nav-icon { font-size: 22px; color: #ccc; }
.nav-label { font-size: 10px; color: #ccc; font-weight: 500; }

.screen-num { font-size: 11px; color: #999; margin-bottom: 8px; font-weight: 500; letter-spacing: 0.5px; text-align: center; }
</style>
</head>
