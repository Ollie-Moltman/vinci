name: Build APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  actions: write
  pages: none
  attestations: none
  checks: write
  pull-requests: write
  repository-projects: none
  security-events: none
  statuses: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      pull-requests: write
      id-token: none
      attestations: none
      checks: write
      statuses: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git /opt/flutter
          echo "/opt/flutter/bin" >> $GITHUB_PATH
          flutter precache

      - run: flutter --version

      - run: flutter pub get

      - run: flutter analyze --no-fatal-infos

      - name: Build debug APK
        run: flutter build apk --debug --no-tree-shake-icons
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vinci-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk